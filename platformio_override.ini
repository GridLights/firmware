; SolSpektrum hardware configuration
; Overrides for the SolSpektrum ESP32 board on top of upstream WLED platformio.ini

[env:esp32dev]
build_flags = ${common.build_flags_esp32} -D WLED_RELEASE_NAME=ESP32
  ; --- Hardware ---
  -D LEDPIN=4
  -D DEFAULT_LED_COUNT=37
  -D DEFAULT_LED_TYPE=30
  -D RLYPIN=5
  -D RLYMDE=0
  -D GRIDLIGHTS_VERSION=\"2.2.1\"
  ; --- Stability ---
  -D WLED_WATCHDOG_TIMEOUT=0
  -D ARDUINO_USB_CDC_ON_BOOT=0
  ; --- Disable unused hardware features ---
  -D WLED_DISABLE_IR
  -D WLED_DISABLE_ADALIGHT
  ; --- RAM reduction ---
  -D WLED_MAX_PRESETS=10
  -D WLED_MAX_BUTTONS=2
  ; CONFIG_LWIP_* values are baked into sdkconfig.h - cannot be overridden via build flags
  ; --- BLE provisioning usermod ---
  -D USERMOD_GL_BLE_TEST
  ; --- Default device name (first flash / factory reset, no cfg.json) ---
  -D SERVERNAME='"Sol Spektrum - Unconfigured"'
  ; --- AP branding: SSID set dynamically as "SolSpektrum-XXXX" (first 4 MAC chars) ---
  -D WLED_AP_SSID='"SolSpektrum"'
  -D WLED_AP_PASS='"sol1234"'
  ; --- BLE (NimBLE, peripheral-only, minimal footprint) ---
  ; Note: CONFIG_BT_ENABLED / CONFIG_BLUEDROID_ENABLED are baked into sdkconfig.h
  ; by the Arduino framework - don't redefine them here, NimBLE-Arduino handles coexistence
  -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  -D CONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
  -D CONFIG_BT_NIMBLE_ROLE_CENTRAL=0
  -D CONFIG_BT_NIMBLE_MAX_BONDS=0
  -D CONFIG_BT_NIMBLE_MAX_CCCDS=4
  -D CONFIG_NIMBLE_CPP_LOG_LEVEL=2
  ; --- BLE/WiFi coexistence (ESP-IDF sw coex) ---
  -D CONFIG_ESP32_WIFI_SW_COEXIST_ENABLE=1
  -D CONFIG_ESP32_WIFI_SW_COEXIST_PREFERENCE_VALUE=0
  ; --- Disable power management to prevent pm_set_sleep_type crash during BLE init ---
  ; WiFi modem sleep still works independently of the PM system
  -D CONFIG_PM_ENABLE=0
lib_deps = ${esp32.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4.1
